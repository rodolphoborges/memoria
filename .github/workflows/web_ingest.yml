name: Manual Web Ingest

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scrape and ingest'
        required: true
        type: string
      context:
        description: 'Context to ingest into'
        required: true
        default: 'pro'
        type: choice
        options:
          - pro
          - personal

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run crawl and ingest
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: python scripts/crawl_ingest.py "${{ github.event.inputs.url }}" --context ${{ github.event.inputs.context }}
