name: Manual Web Ingest

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scrape and ingest'
        required: true
        type: string
      context:
        description: 'Context to ingest into'
        required: true
        default: 'pro'
        type: choice
        options:
          - pro
          - personal
      depth:
        description: 'Crawl depth (1 = single page)'
        required: true
        default: '1'
        type: string
      limit:
        description: 'Max total pages to ingest'
        required: true
        default: '10'
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run crawl and ingest
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: python scripts/crawl_ingest.py "${{ github.event.inputs.url }}" --context ${{ github.event.inputs.context }} --depth ${{ github.event.inputs.depth }} --limit ${{ github.event.inputs.limit }}

      - name: Update index stats
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: python scripts/update_stats.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update index stats [skip ci]"
          file_pattern: "stats.json"
